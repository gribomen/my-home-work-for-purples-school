<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles/style.css">
    <title>Demo</title>
</head>

<body>
    <main>
        <h1>Свяжитесь со мной</h1>
        <form action="#">
            <div class="input_email">
                <img src="./images/message.svg" alt="иконка конверта">
                <input type="email" id="email" value="123@gmail.com" required>
                <label for="email">E-mail<sup>*</sup></label>

            </div>
            <div class="input_telegram">
                <img src="./images/telegram.svg" alt="иконка конверта">
                <input type="telegram" id="teleg ram" value="123@gmail.com" required>
                <label for="telegram">Telegram</label>

            </div>
            <div class="input_topic">
                <img src="./images/vector.svg" alt="иконка конверта">
                <select name="topic" id="topic">
                    <option value="courses">Приобретение курсов</option>
                </select>
                <label for="topic">Тема<sup>*</sup></label>

            </div>
            <div class="textarea_text">
                <label for="text">Комментарий</label>
                <textarea name="text" id="text" rows="4"
                    cols="70">Хочу купить ваши курсы для своих сотрудников и они станут очень умными. Направьте, пожалуйста, свои реквизиты для выставления счета. Хочу купить ваши курсы для своих сотрудников и они станут очень умными. Направьте, пожалуйста, свои реквизиты для выставления счета.</textarea>
            </div>
            <button type="submit">Отправить</button>
        </form>
    </main>
</body>

</html>
