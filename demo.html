<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo</title>
</head>

<body>
    <main>
        <h1>Свяжитесь со мной</h1>
        <form action="#">
            <div>
                <img src="./message.svg" alt="иконка конверта">
                <label for="email">E-mail<sup>*</sup></label>
                <input type="email" id="email" value="123@gmail.com">
            </div>
            <div>
                <img src="./telegram.svg" alt="иконка конверта">
                <label for="telegram">Telegram</label>
                <input type="telegram" id="telegram" value="123@gmail.com">
            </div>
            <div>
                <img src="./vector.svg" alt="иконка конверта">
                <label for="topic">Тема<sup>*</sup></label>
                <select name="topic" id="topic">
                    <option value="courses">Приобретение курсов</option>
                </select>
            </div>
            <div>
                <label for="text"></label>
                <textarea name="text" id="text" rows="4" cols="70">Хочу купить ваши курсы для своих сотрудников и они станут очень умными. Направьте, пожалуйста, свои реквизиты для выставления счета. Хочу купить ваши курсы для своих сотрудников и они станут очень умными. Направьте, пожалуйста, свои реквизиты для выставления счета.</textarea>
            </div>
            <button type="submit">Отправить</button>
        </form>
    </main>
</body>

</html>
