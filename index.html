<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miro</title>
</head>

<body>
    <main>
        <section>
            <table>
                <caption>
                    Таблица расходов и доходов
                </caption>
                <thead>
                    <tr>
                        <th colspan="2">Год</th>
                        <th colspan="2">2023</th>
                        <th colspan="2">2024</th>
                    </tr>
                    <tr>
                        <th colspan="2">Полугодие</th>
                        <th>1</th>
                        <th>2</th>
                        <th>1</th>
                        <th>2</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td colspan="2">Доход</td>
                        <td>1500$</td>
                        <td>1800$</td>
                        <td>2000$</td>
                        <td>3000$</td>
                    </tr>
                    <tr>
                        <td colspan="2">Расход</td>
                        <td>-500$</td>
                        <td>-600$</td>
                        <td>-700$</td>
                        <td>-1000$</td>
                    </tr>
                </tbody>
                <tfoot>
                    <th colspan="2">Итог</th>
                    <td>1000$</td>
                    <td>1200$</td>
                    <td>1300$</td>
                    <td>2000$</td>
                </tfoot>
            </table>
        </section>
    </main>
</body>

</html>
